services:
  - type: web
    name: portfolio-app
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

databases:
  - name: portfolio-db
    engine: postgres
    version: "16"
    plan: free
    initializer:
      startCommand: npm run db:push
